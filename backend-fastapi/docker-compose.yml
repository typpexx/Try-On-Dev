services:
  db:
    image: postgres:16
    container_name: fashion_tryon_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fashion_tryon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    container_name: fashion_tryon_api
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8000:8000"
    environment:
      APP_NAME: Fashion Try-On API
      ENVIRONMENT: development
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/fashion_tryon
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://localhost:5174
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app/app

volumes:
  pgdata:
